name: Build Linux

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            scons \
            pkg-config \
            libfltk1.3-dev \
            portaudio19-dev \
            libsndfile1-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxft-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrender-dev \
            libxfixes-dev \
            libfontconfig1-dev

      - name: Build ep128emu
        run: |
          scons -j2 nosdl=1 nolua=1 curl=0 utils=0 release=0

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ep128emu-linux-test-build
          path: |
            ep128emu
            epmakecfg
            tapeedit
