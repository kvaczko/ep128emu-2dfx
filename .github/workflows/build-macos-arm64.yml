name: Build macOS Apple Silicon

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-macos-arm64:
    runs-on: macos-15
    
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          brew update
          brew install scons fltk portaudio libsndfile pkg-config

      - name: Patch fltk-config weak framework output for SCons
        run: |
          mkdir -p "$GITHUB_WORKSPACE/ci-bin"
          cat > "$GITHUB_WORKSPACE/ci-bin/fltk-config" <<'EOF'
          #!/bin/sh
          /opt/homebrew/bin/fltk-config "$@" | sed -E 's/-weak_framework ([^ ]+)/-Wl,-weak_framework,\1/g'
          EOF
          chmod +x "$GITHUB_WORKSPACE/ci-bin/fltk-config"
          echo "$GITHUB_WORKSPACE/ci-bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          uname -a
          arch
          clang++ --version
          scons --version
          which fltk-config
          fltk-config --version || true
          fltk-config --cxxflags --ldflags --use-images --use-gl || true

      - name: Build ep128emu
        run: |
          scons -j2 nosdl=1 nolua=1 curl=0 utils=0 release=0

      - name: Prepare artifact
        run: |
          rm -rf artifact
          mkdir -p artifact

          # Build/populate the .app bundle explicitly.
          mkdir -p ep128emu.app/Contents/MacOS

          cp -f ep128emu ep128emu.app/Contents/MacOS/ep128emu
          chmod +x ep128emu.app/Contents/MacOS/ep128emu

          if [ -f makecfg ]; then
            cp -f makecfg ep128emu.app/Contents/MacOS/makecfg
            chmod +x ep128emu.app/Contents/MacOS/makecfg
          fi

          if [ -f tapeedit ]; then
            cp -f tapeedit ep128emu.app/Contents/MacOS/tapeedit
            chmod +x ep128emu.app/Contents/MacOS/tapeedit
          fi

          # Make the app bundle explicitly compatible with macOS 13+.
          /usr/libexec/PlistBuddy -c "Delete :LSMinimumSystemVersion" ep128emu.app/Contents/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 13.0" ep128emu.app/Contents/Info.plist

          # Tar preserves executable permissions better than raw artifact upload.
          tar -czf artifact/ep128emu-macos-arm64-test-build.tar.gz ep128emu.app
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ep128emu-macos-arm64-test-build
          path: artifact/ep128emu-macos-arm64-test-build.tar.gz
